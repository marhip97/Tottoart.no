backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "malerier"
    label: "Malerier"
    folder: "_malerier"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tittel", name: "tittel", widget: "string" }
      - { label: "Nummer", name: "nummer", widget: "number" }
      - { label: "Teknikk", name: "teknikk", widget: "string", hint: "F.eks. Akryl på lerret" }
      - { label: "År", name: "aar", widget: "string" }
      - { label: "Bilde", name: "bilde", widget: "image", required: false }
      - { label: "Tilgjengelig for salg", name: "tilSalgs", widget: "boolean", default: true }

  - name: "innstillinger"
    label: "Innstillinger"
    files:
      - label: "Generelt"
        name: "generelt"
        file: "_data/generelt.yml"
        fields:
          - { label: "Kunstner navn", name: "navn", widget: "string" }
          - { label: "Undertittel / tagline", name: "tagline", widget: "string" }
          - { label: "Instagram-brukernavn", name: "instagram", widget: "string" }
          - { label: "E-post", name: "epost", widget: "string" }
          - { label: "Om kunstneren (tekst)", name: "omKunstner", widget: "text" }
